<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#667eea" />
    <meta name="description" content="记录每一天的精彩生活" />
    <link rel="manifest" href="/lobster-diary/manifest.json" />
    <title>🦞 龙虾日记 - 移动版</title>
    <script>
      // 检测设备，PC端自动跳转
      if (window.innerWidth >= 768) {
        window.location.href = '/lobster-diary/pc.html'
      }
    </script>
    <script type="module" crossorigin src="/lobster-diary/assets/mobile-ixKq2sg9.js"></script>
    <link rel="modulepreload" crossorigin href="/lobster-diary/assets/Write-Dy8q3KHx.js">
    <link rel="stylesheet" crossorigin href="/lobster-diary/assets/Write-b78uL-dz.css">
    <link rel="stylesheet" crossorigin href="/lobster-diary/assets/mobile-yQRNXUIa.css">
  </head>
  <body>
    <div id="app"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/lobster-diary/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope)
            })
            .catch((error) => {
              console.log('SW registration failed:', error)
            })
        })
      }
    </script>
  </body>
</html>
